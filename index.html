<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1>To-do Application</h1>
<input type="text" name="" id="todo">
<button onclick="addTodo()">Add list</button>
<ul id="list">

</ul>
<script>
var getList=document.getElementById('list')
var getInp =document.getElementById('todo')

function addTodo(){

getList.innerHTML+=`<li>${getInp.value} </li>`
getInp.value =" "

}
</script>
   
</body>
</html>
